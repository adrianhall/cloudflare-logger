name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same ref so superseded PR pushes don't waste
# runner minutes. On main, each push gets its own run (cancel-in-progress: false).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # pin to engines floor (node >= 24); ships npm 11
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs check:format, check:lint, check:types, check:dist, and check:pack.
      # check:dist builds into a temp dir to verify source compiles cleanly.
      - name: Check
        run: npm run check

      # Verify the committed dist/ matches a fresh build from source.
      # check:dist above only proves compilation succeeds; this proves the
      # committed artefacts are current.
      - name: Verify committed dist matches source
        run: npm run build && test -z "$(git status --porcelain -- dist)"

      # Runs all four Vitest projects (node, browser, workers, package) and
      # enforces 100% statement/branch/function/line coverage.
      - name: Test with coverage
        run: npm run test:coverage
